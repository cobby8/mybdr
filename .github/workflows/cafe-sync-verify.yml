# ═══════════════════════════════════════════════════════════════════════════════
# cafe-sync-verify — 다음카페 sync 품질 검증봇
# ═══════════════════════════════════════════════════════════════════════════════
# 설계: .claude/scratchpad-cafe-sync.md
#       "📋 카페 sync 품질 검증봇 설계안 (2026-04-21, planner-architect)"
#
# 동작 원칙:
#   - 하루 1회 KST 08:10 자동 실행 (UTC 23:10 전날).
#     이유: 07:00 첫 sync + 08:00 두 번째 sync 직후 안정 지점.
#   - 1주차: execute_issues=false 기본 (dry-run). artifact 만 관찰.
#   - 2주차: workflow_dispatch 로 execute_issues=true 전환 후 실제 이슈 생성 테스트.
#
# 본 workflow 는 기존 cafe-sync.yml / sync-cafe.ts 를 **절대 수정하지 않음**.
# 완전 독립 실행 (읽기 전용 검증).
# ═══════════════════════════════════════════════════════════════════════════════

name: cafe-sync-verify

on:
  # ─── 스케줄 ────────────────────────────────────────────────────────────────
  # KST 08:10 = UTC 23:10 (전일). cron 문법: "분 시 일 월 요일"
  schedule:
    - cron: "10 23 * * *"

  # ─── 수동 트리거 (이슈 생성 테스트 및 임시 집계) ─────────────────────────
  workflow_dispatch:
    inputs:
      execute_issues:
        description: "실제 Issue 생성/코멘트/close (1주차 기본 false — 관찰용)"
        type: boolean
        default: false
      since_hours:
        description: "집계 기간 (시간). 기본 24"
        type: string
        default: "24"

# ─── 권한 ─────────────────────────────────────────────────────────────────────
# 이유:
#   - issues:write → Issue 생성/코멘트/close
#   - actions:read → workflow_runs / secrets metadata (I3/I4)
#   - contents:read → checkout
permissions:
  contents: read
  issues: write
  actions: read

# ─── 동시 실행 제어 ────────────────────────────────────────────────────────────
# 이전 run 이 늦어져도 덮어쓰지 않음 (설계안 R6 관측성 보존).
concurrency:
  group: cafe-sync-verify
  cancel-in-progress: false

jobs:
  verify:
    name: "카페 sync 품질 검증"
    runs-on: ubuntu-latest
    # DB 쿼리 + GH API 호출만 — 10분 넉넉.
    timeout-minutes: 10

    env:
      CI: "true"
      TZ: "Asia/Seoul"
      # cafe-sync.yml 과 동일 Secret 재사용 (추가 등록 0)
      DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
      # gh CLI 자동 인식 env
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ─── 1. 체크아웃 ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 2. Node 설치 ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ─── 3. Prisma Client 생성 (postinstall 실패 대비) ──────────────────────
      - name: Prisma generate
        run: npx prisma generate

      # ─── 4. CI 운영 DB 가드 (cafe-sync.yml 과 동일 관습) ────────────────────
      - name: Validate DB is development (CI guard)
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret 미설정"
            exit 1
          fi
          if echo "$DATABASE_URL" | grep -q 'bwoorsgoijvlgutkrcvs'; then
            echo "dev DB identifier confirmed"
          else
            echo "::error::DATABASE_URL 이 개발 DB 아님 (bwoorsgoijvlgutkrcvs 미포함). CI 중단."
            exit 1
          fi

      # ─── 5. verify 스크립트 실행 ───────────────────────────────────────────
      # 이유:
      #   - workflow_dispatch 로 execute_issues=true 입력 시 --execute-issues 로 전환
      #   - schedule 실행 시 기본 --dry-run (1주차 안전)
      #   - since_hours 입력 없으면 24h 기본
      - name: Run verify
        id: verify
        shell: bash
        run: |
          set -o pipefail
          mkdir -p tmp

          # execute_issues 입력 해석 (workflow_dispatch 전용, schedule 은 dry-run)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.execute_issues }}" = "true" ]; then
            FLAGS="--execute-issues"
            echo "모드: execute-issues (실제 Issue 관리 ON)"
          else
            FLAGS="--dry-run"
            echo "모드: dry-run (Issue 생성 0)"
          fi

          SINCE="${{ github.event.inputs.since_hours || '24' }}"

          npx tsx scripts/verify-cafe-sync.ts \
            --since=${SINCE}h \
            --output=console \
            $FLAGS \
            2>&1 | tee tmp/verify.log

      # ─── 6. 리포트 artifact 업로드 (30일 보관) ─────────────────────────────
      # if: always() 로 실패 시에도 디버깅 가능.
      - name: Upload verify report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cafe-sync-verify-${{ github.run_id }}
          path: |
            tmp/verify-report-*.json
            tmp/verify.log
          retention-days: 30
          if-no-files-found: warn

      # ─── 7. 일일 리포트 메일 준비 ─────────────────────────────────────────
      # [2026-04-22] Slack → 메일 전환. 수신자: cobby8@stiz.kr, bdrbasket@gmail.com
      # severity=ok → 1줄 요약 (제목만, 본문 최소) / warn·alert → 지표 상세 + 권고.
      - name: Prepare daily report mail
        if: always()
        id: prep_mail
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          REPORT=$(ls -t tmp/verify-report-*.json 2>/dev/null | head -n 1)
          if [ -z "$REPORT" ]; then
            echo "verify-report JSON 없음 — 메일 건너뜀"
            echo "has_report=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export REPORT_PATH="$REPORT"
          export RUN_URL

          # node 로 subject + html 생성
          OUT=$(node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync(process.env.REPORT_PATH, 'utf8'));
            const url = process.env.RUN_URL;
            const sev = r.severity;
            const icon = sev==='ok'?'✅':sev==='warn'?'⚠️':sev==='alert'?'🚨':sev==='disabled_phase1'?'⏸️':'❓';
            const sevColor = sev==='ok'?'#2e7d32':sev==='warn'?'#f57c00':sev==='alert'?'#c62828':'#555';
            const today = r.run_at.slice(0, 10);
            const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            const subject = '[cafe-sync-verify] ' + sev.toUpperCase() + ' · ' + today + ' · 최근 ' + r.since_raw;

            let bodyInner = '';
            if (sev === 'ok' || sev === 'disabled_phase1') {
              bodyInner = '<p style=\"font-size:16px;margin:16px 0;\">' + icon + ' <b>정상 운영 중</b> — 최근 ' + esc(r.since_raw) + ' 구간 이상 없음.</p>';
            } else {
              const badIndicators = Object.entries(r.indicators).filter(([_, v]) => v.status !== 'ok' && v.status !== 'disabled_phase1');
              const rows = badIndicators.map(([k, v]) => {
                const statusColor = v.status==='warn'?'#f57c00':v.status==='alert'?'#c62828':'#888';
                const val = v.value===null?'(n/a)':String(v.value);
                return '<tr><td style=\"padding:6px 10px;border-bottom:1px solid #eee;\"><b>' + esc(k) + '</b></td><td style=\"padding:6px 10px;border-bottom:1px solid #eee;\">' + esc(val) + '</td><td style=\"padding:6px 10px;border-bottom:1px solid #eee;color:' + statusColor + ';\">' + esc(v.status) + '</td><td style=\"padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;color:#555;\">' + esc(v.note || '') + '</td></tr>';
              }).join('');
              bodyInner += '<h3>이상 지표</h3>';
              bodyInner += '<table style=\"border-collapse:collapse;width:100%;font-size:14px;\"><thead><tr style=\"background:#fafafa;\"><th style=\"text-align:left;padding:8px 10px;border-bottom:2px solid #ddd;\">지표</th><th style=\"text-align:left;padding:8px 10px;border-bottom:2px solid #ddd;\">값</th><th style=\"text-align:left;padding:8px 10px;border-bottom:2px solid #ddd;\">상태</th><th style=\"text-align:left;padding:8px 10px;border-bottom:2px solid #ddd;\">비고</th></tr></thead><tbody>' + rows + '</tbody></table>';
              if (r.recommendations && r.recommendations.length > 0) {
                bodyInner += '<h3>추천 조치</h3><ul>';
                for (const rec of r.recommendations) bodyInner += '<li>' + esc(rec) + '</li>';
                bodyInner += '</ul>';
              }
            }

            const html = [
              '<!doctype html><html><body style=\"font-family:-apple-system,Segoe UI,Pretendard,sans-serif;color:#222;max-width:760px;margin:0 auto;padding:24px;\">',
              '<h2 style=\"color:' + sevColor + ';margin-bottom:4px;\">' + icon + ' cafe-sync-verify 일일 리포트</h2>',
              '<p style=\"color:#666;margin-top:0;\">severity=<b style=\"color:' + sevColor + ';\">' + sev.toUpperCase() + '</b> · 최근 ' + esc(r.since_raw) + ' · 모드: ' + (r.dry_run ? 'dry-run' : 'execute-issues') + ' · <a href=\"' + esc(url) + '\">런 상세</a></p>',
              bodyInner,
              '<hr style=\"margin-top:32px;border:none;border-top:1px solid #eee;\">',
              '<p style=\"color:#888;font-size:12px;\">mybdr cafe-sync-verify bot · 매일 KST 08:10 자동 실행</p>',
              '</body></html>'
            ].join('');
            console.log('SUBJECT:::' + subject);
            console.log('HTML_START');
            console.log(html);
            console.log('HTML_END');
          ")

          # OUT 에서 subject/html 분리
          SUBJECT=$(echo "$OUT" | grep '^SUBJECT:::' | sed 's/^SUBJECT::://')
          HTML=$(echo "$OUT" | sed -n '/^HTML_START$/,/^HTML_END$/p' | sed '1d;$d')

          {
            echo "has_report=true"
            echo "subject=$SUBJECT"
            echo "html<<HTML_EOF"
            echo "$HTML"
            echo "HTML_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "mail prepared (subject=$SUBJECT)"

      # ─── 8. 메일 전송 — MAIL_USERNAME secret 없으면 자동 스킵 ───────────────
      - name: Send daily report mail
        if: always() && steps.prep_mail.outputs.has_report == 'true' && env.HAS_MAIL_SECRET == 'true'
        env:
          HAS_MAIL_SECRET: ${{ secrets.MAIL_USERNAME != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          from: mybdr cafe-sync bot <${{ secrets.MAIL_USERNAME }}>
          to: cobby8@stiz.kr, bdrbasket@gmail.com
          subject: ${{ steps.prep_mail.outputs.subject }}
          html_body: ${{ steps.prep_mail.outputs.html }}
