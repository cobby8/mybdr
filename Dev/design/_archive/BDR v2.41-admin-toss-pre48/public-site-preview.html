<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>공개 토너먼트 사이트 — 데이터 통일 시안 (v2.42)</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css" />
<style>
  /* ── 미리보기 제어 바 (BDR 사이트와 분리된 데모 chrome) ─────── */
  .pv-topbar { position: sticky; top: 0; z-index: 60; background: #11151c; color: #fff; border-bottom: 1px solid rgba(255,255,255,.1); }
  .pv-in { max-width: 1180px; margin: 0 auto; padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .pv-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; letter-spacing: -.01em; white-space: nowrap; }
  .pv-title .ms { font-size: 18px; color: #4ade80; }
  .pv-states { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; min-width: 0; }
  .pv-state { appearance: none; border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.05); color: rgba(255,255,255,.72); font-family: inherit; font-size: 12px; font-weight: 700; padding: 6px 11px; border-radius: 7px; cursor: pointer; white-space: nowrap; transition: all .12s; }
  .pv-state:hover { background: rgba(255,255,255,.12); color: #fff; }
  .pv-state[data-on="true"] { background: #fff; color: #11151c; border-color: #fff; }
  .pv-state .n { font-family: "Roboto Mono", monospace; opacity: .6; margin-right: 5px; }
  .pv-hint { background: #181d26; color: rgba(255,255,255,.7); font-size: 12.5px; }
  .pv-hint__in { max-width: 1180px; margin: 0 auto; padding: 8px 20px; display: flex; align-items: center; gap: 9px; }
  .pv-hint .ms { font-size: 16px; color: #6b7684; }
  .pv-hint b { color: #fff; }

  /* ── 상태 placeholder (준비중 / 비공개) ───────────────────── */
  .s-prep { background: var(--s-card); border: 1px dashed var(--s-border); border-radius: 8px; padding: 44px 28px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .s-prep__ic { width: 56px; height: 56px; border-radius: 14px; background: rgba(27,60,135,.07); color: var(--s-navy); display: grid; place-items: center; margin-bottom: 8px; }
  .s-prep__ic .ms { font-size: 30px; }
  .s-prep__t { font-size: 18px; font-weight: 800; }
  .s-prep__x { font-size: 13.5px; color: var(--s-mute); max-width: 420px; line-height: 1.6; }
  .s-prep__src { margin-top: 12px; font-size: 11.5px; font-weight: 700; color: var(--s-dim); font-family: "Roboto Mono", monospace; background: var(--s-bg); border: 1px solid var(--s-border); padding: 4px 10px; border-radius: 6px; }

  .s-statusband { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .s-srcnote { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700; color: var(--s-navy); background: rgba(27,60,135,.06); border: 1px solid rgba(27,60,135,.14); padding: 4px 10px; border-radius: 6px; font-family: "Roboto Mono", monospace; }
  .s-srcnote .ms { font-size: 14px; }
  .ms { font-family: "Material Symbols Outlined"; font-variation-settings: "FILL" 0, "wght" 400; vertical-align: middle; line-height: 1; }

  .s-divrow { display: flex; align-items: center; gap: 12px; padding: 14px 16px; min-width: 0; }
  .s-divrow__bar { width: 4px; align-self: stretch; border-radius: 4px; flex: none; }
  .s-divrow__body { min-width: 0; flex: 1; }
  .s-divrow__nm { font-weight: 800; font-size: 15.5px; }
  .s-divrow__fmt { font-size: 12.5px; color: var(--s-mute); margin-top: 2px; }
  .s-divrow__n { font-family: "Roboto Mono", monospace; font-weight: 800; font-size: 15px; color: var(--s-navy); flex: none; }
  .s-livedot { width: 7px; height: 7px; border-radius: 50%; background: var(--s-red); box-shadow: 0 0 0 3px rgba(227,27,35,.2); display: inline-block; animation: pvpulse 1.4s infinite; }
  @keyframes pvpulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .s-podium { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }
  .s-pod { background: var(--s-card); border: 1px solid var(--s-border); border-radius: 8px; padding: 18px 14px; text-align: center; }
  .s-pod__r { font-size: 12px; font-weight: 800; letter-spacing: .04em; }
  .s-pod__t { font-size: 17px; font-weight: 800; margin-top: 8px; }
  .s-pod--1 { border-color: rgba(201,162,39,.5); background: linear-gradient(180deg, rgba(201,162,39,.08), #fff); }
  .s-pod--1 .s-pod__r { color: #b8860b; }
  @media (max-width: 760px) { .s-podium { grid-template-columns: 1fr; } .pv-in { padding: 9px 14px; } .pv-title span:last-child { display: none; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="public-site-data.jsx"></script>
<script type="text/babel" src="public-site-pages.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(<window.PublicSitePreview />);
</script>
</body>
</html>
