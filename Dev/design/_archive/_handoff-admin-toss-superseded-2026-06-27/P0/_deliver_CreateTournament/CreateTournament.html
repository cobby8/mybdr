<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BDR 새 대회 만들기 — Toss (3컬럼)</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap" />
<link rel="stylesheet" href="toss.css" />
<style>
  /* focused 풀폭 */
  .ts-main { padding-bottom: 0; }
  .ct-main__inner { max-width: 1180px; margin: 0 auto; padding: 36px 32px 124px; }
  @media (max-width: 720px) { .ct-main__inner { padding: 20px 16px 132px; } }

  .ct-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 26px; flex-wrap: wrap; }
  .ct-head__aux { display: flex; gap: 8px; flex-wrap: wrap; }

  /* 3컬럼 / 2컬럼 */
  .ct-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; align-items: start; }
  @media (max-width: 1180px) { .ct-grid { grid-template-columns: 1fr; max-width: 640px; margin: 0 auto; } }
  .ct-grid--2 { grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr); }
  @media (max-width: 980px) { .ct-grid--2 { grid-template-columns: 1fr; max-width: 620px; margin: 0 auto; } }
  .ct-col { min-width: 0; }

  .ct-headicon { width: 32px; height: 32px; border-radius: 10px; background: var(--primary-weak); display: grid; place-items: center; flex: 0 0 auto; }

  /* 빈 상태 박스 */
  .ct-emptybox { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 28px 16px; background: var(--grey-50); border: 1px dashed var(--border-strong); border-radius: 16px; color: var(--ink-mute); font-size: 13.5px; text-align: center; }
  .ct-emptybox--tall { padding: 48px 16px; }

  /* 경기장 행 */
  .ct-venue { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--grey-50); border-radius: 12px; }
  .ct-iconbtn { width: 30px; height: 30px; border: 0; background: transparent; border-radius: 9px; display: grid; place-items: center; cursor: pointer; color: var(--ink-mute); flex: 0 0 auto; transition: background .12s, color .12s; }
  .ct-iconbtn:hover { background: var(--grey-200); color: var(--ink); }

  /* 종별 카드 */
  .ct-cat { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .ct-cat__head { display: flex; align-items: center; gap: 9px; padding: 12px 14px; background: var(--grey-50); border-bottom: 1px solid var(--border); }
  .ct-cat__body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .ct-dvn { background: var(--grey-50); border-radius: 12px; padding: 11px 12px; }
  .ct-dvn__top { display: flex; align-items: center; gap: 8px; }
  .ct-dvn__name { flex: 1; min-width: 0; font-weight: 800; font-size: 14.5px; color: var(--ink); border: 0; background: transparent; font-family: var(--ff); outline: none; padding: 2px 0; }
  .ct-dvn__method { border: 1px solid var(--border); border-radius: 9px; background: #fff; font-family: var(--ff); font-size: 12.5px; font-weight: 700; color: var(--ink-soft); padding: 6px 8px; cursor: pointer; flex: 0 0 auto; }
  .ct-dvn__bottom { display: flex; gap: 8px; margin-top: 10px; }
  .ct-inline { flex: 1; display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 7px 11px; }
  .ct-inline > span:first-child { font-size: 12px; font-weight: 700; color: var(--ink-mute); white-space: nowrap; }
  .ct-inline input { flex: 1; min-width: 0; width: 100%; border: 0; background: transparent; outline: none; font-family: var(--ff-mono); font-size: 13.5px; font-weight: 600; color: var(--ink); text-align: right; }
  .ct-inline .ct-unit { font-size: 12px; color: var(--ink-mute); }

  .ct-banner { display: flex; align-items: flex-start; gap: 9px; padding: 13px 14px; background: var(--ok-weak); border-radius: 14px; font-size: 13px; color: var(--ink-soft); line-height: 1.5; }
  .ct-banner svg { flex: 0 0 auto; margin-top: 1px; }

  /* 프리셋 칩 */
  .ct-presets { display: flex; flex-wrap: wrap; gap: 7px; }
  .ct-presets .ts-chip { font-size: 13px; padding: 8px 13px; }

  /* 경기장 검색 */
  .ct-vsearch { position: relative; margin-bottom: 14px; }
  .ct-vsearch__inputwrap { display: flex; align-items: center; gap: 8px; padding: 0 14px; background: var(--grey-100); border-radius: var(--radius-input); transition: box-shadow .15s, background .15s; }
  .ct-vsearch__inputwrap:focus-within { background: #fff; box-shadow: 0 0 0 2px var(--primary); }
  .ct-vsearch__inputwrap input { flex: 1; min-width: 0; border: 0; background: transparent; outline: none; padding: 13px 0; font-size: 16px; font-family: var(--ff); color: var(--ink); }
  .ct-vsearch__inputwrap input::placeholder { color: var(--ink-dim); }
  .ct-vsearch__menu { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #fff; border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--sh-md); z-index: 20; overflow: hidden auto; max-height: 264px; }
  .ct-vsearch__opt { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 14px; border: 0; background: transparent; cursor: pointer; font-family: var(--ff); text-align: left; }
  .ct-vsearch__opt:hover { background: var(--grey-50); }
  .ct-vsearch__add { border-top: 1px solid var(--border); }

  /* 후원사 로고 타일 */
  .ct-sptile { position: relative; width: 124px; }
  .ct-sptile image-slot { box-shadow: var(--sh-xs); border-radius: 10px; }
  .ct-sptile__name { margin-top: 7px; font-size: 13px; font-weight: 600; color: var(--ink); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ct-sptile__x { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border: 0; border-radius: 7px; background: rgba(25,31,40,0.55); color: #fff; display: grid; place-items: center; cursor: pointer; z-index: 2; }
  .ct-sptile__x:hover { background: var(--danger); }

  /* 이전 대회 행 */
  .ct-pastrow { display: flex; align-items: center; gap: 12px; padding: 13px 14px; background: var(--grey-50); border: 1px solid transparent; border-radius: 14px; cursor: pointer; font-family: var(--ff); width: 100%; transition: border-color .12s, background .12s; }
  .ct-pastrow:hover { border-color: var(--primary); background: var(--primary-weak); }
  .ct-pastrow__icon { width: 38px; height: 38px; border-radius: 11px; background: #fff; display: grid; place-items: center; flex: 0 0 auto; box-shadow: var(--sh-xs); }

  /* ── 경기 설정: 서브헤더 / 설정 행 / 스테퍼 / 세그 ───────────── */
  .ct-subhead { display: flex; align-items: center; gap: 7px; margin: 20px 0 8px; padding-top: 16px; border-top: 1px solid var(--border); }
  .ct-subhead:first-of-type { margin-top: 2px; padding-top: 0; border-top: 0; }
  .ct-subhead > span:not(.ct-subhead__hint) { font-size: 13.5px; font-weight: 800; color: var(--ink); letter-spacing: -0.01em; }
  .ct-subhead__hint { margin-left: auto; font-size: 11.5px; font-weight: 600; color: var(--ink-mute); }

  .ct-set { display: flex; align-items: center; gap: 12px; min-height: 50px; padding: 8px 0; border-top: 1px solid var(--border); }
  .ct-set + .ct-set { border-top: 1px solid var(--border); }
  .ct-set__txt { flex: 1; min-width: 0; }
  .ct-set__name { font-size: 13.5px; font-weight: 800; color: var(--ink); letter-spacing: -0.01em; }
  .ct-set__hint { font-size: 11.5px; font-weight: 600; color: var(--ink-mute); margin-top: 1px; }

  .ct-stepper { display: inline-flex; align-items: center; border: 1px solid var(--border-strong); border-radius: 11px; overflow: hidden; background: #fff; flex: 0 0 auto; }
  .ct-stepper button { width: 38px; height: 38px; border: 0; background: transparent; cursor: pointer; color: var(--ink-soft); display: grid; place-items: center; transition: background .12s; }
  .ct-stepper button:hover:not(:disabled) { background: var(--grey-50); }
  .ct-stepper button:disabled { color: var(--ink-dim); cursor: not-allowed; }
  .ct-stepper__val { min-width: 70px; height: 38px; display: flex; align-items: center; justify-content: center; gap: 4px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); font-family: var(--ff-mono); font-weight: 800; font-size: 16px; color: var(--ink); font-variant-numeric: tabular-nums; }
  .ct-stepper__val .u { font-size: 11px; font-weight: 700; color: var(--ink-mute); font-family: var(--ff); }

  .ct-segsm { display: inline-flex; gap: 3px; padding: 3px; background: var(--grey-100); border-radius: 11px; flex: 0 0 auto; }
  .ct-segsm button { border: 0; background: transparent; border-radius: 8px; padding: 7px 14px; font-family: var(--ff); font-weight: 700; font-size: 12.5px; color: var(--ink-mute); cursor: pointer; transition: color .12s; }
  .ct-segsm button[data-active="true"] { background: #fff; color: var(--primary); box-shadow: var(--sh-xs); }

  /* 유니폼 */
  .ct-uni { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ct-unicell { border: 1px solid var(--border); border-radius: 14px; padding: 14px; background: var(--grey-50); }
  .ct-unicell--text { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .ct-unicell--text .ct-unicell__cap { margin-bottom: 0; flex: 1; min-width: 0; }
  .ct-unicell__tone { font-size: 15px; font-weight: 800; color: var(--ink-soft); white-space: nowrap; flex: 0 0 auto; }
  .ct-unicell__cap { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
  .ct-unicell__dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; box-shadow: 0 0 0 1px var(--border-strong); }
  .ct-unicell__team { font-size: 13px; font-weight: 900; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ct-unicell__role { margin-left: auto; font-size: 9.5px; font-weight: 800; letter-spacing: 0.12em; color: var(--ink-dim); font-family: var(--ff-mono); }
  .ct-unichip { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 12px 9px 9px; background: #fff; border: 1px solid var(--border-strong); border-radius: 11px; cursor: pointer; font-family: var(--ff); transition: border-color .12s; }
  .ct-unichip:hover:not(:disabled) { border-color: var(--primary); }
  .ct-unichip:disabled { opacity: .55; cursor: not-allowed; }
  .ct-unichip__sw { width: 40px; height: 40px; border-radius: 9px; border: 2px solid var(--border-strong); flex: 0 0 auto; }
  .ct-unichip__txt { flex: 1; min-width: 0; text-align: left; }
  .ct-unichip__name { display: block; font-size: 14px; font-weight: 800; color: var(--ink); }
  .ct-unichip__hex { display: block; font-size: 11px; font-family: var(--ff-mono); font-weight: 700; color: var(--ink-mute); letter-spacing: 0.03em; }
  .ct-unichip__edit { font-size: 11px; font-weight: 800; color: var(--ink-mute); flex: 0 0 auto; }

  .ct-vest { display: flex; align-items: flex-start; gap: 11px; margin-top: 12px; padding: 12px 14px; background: var(--grey-50); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; }
  .ct-vest input { position: absolute; opacity: 0; pointer-events: none; }
  .ct-vest__box { width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--border-strong); background: #fff; display: grid; place-items: center; color: #fff; flex: 0 0 auto; margin-top: 1px; transition: background .12s, border-color .12s; }
  .ct-vest__box svg { opacity: 0; }
  .ct-vest input:checked + .ct-vest__box { background: var(--primary); border-color: var(--primary); }
  .ct-vest input:checked + .ct-vest__box svg { opacity: 1; }
  .ct-vest__name { display: block; font-size: 14px; font-weight: 800; color: var(--ink); }
  .ct-vest__hint { display: block; font-size: 12px; font-weight: 600; color: var(--ink-mute); margin-top: 1px; }

  .ct-uninote { display: flex; align-items: flex-start; gap: 8px; margin-top: 10px; font-size: 12px; font-weight: 600; color: var(--ink-mute); line-height: 1.5; }
  .ct-uninote svg { flex: 0 0 auto; margin-top: 1px; }
  .ct-uninote b { color: var(--ink-soft); font-weight: 800; }

  /* 유니폼 팔레트 모달 */
  .ct-pal { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .ct-palsw { aspect-ratio: 1; border-radius: 10px; border: 2px solid var(--border); cursor: pointer; display: grid; place-items: center; transition: transform .1s, box-shadow .12s; }
  .ct-palsw:hover { transform: scale(1.06); }
  .ct-palsw[data-active="true"] { box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--primary); }
  .ct-hexinput { font-family: var(--ff-mono); text-transform: uppercase; }

  /* 디비전 매칭 (경기날짜·장소) */
  .ct-dvn__match { display: flex; gap: 8px; margin-top: 10px; }
  .ct-dvn__matchempty { display: flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 11.5px; font-weight: 600; color: var(--ink-dim); line-height: 1.4; }
  .ct-dvn__matchempty svg { flex: 0 0 auto; }
  .ct-dvn__matchempty b { color: var(--ink-mute); font-weight: 700; }
  .ct-msel { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 0 9px; }
  .ct-msel--grow { flex: 1.4; }
  .ct-msel svg { flex: 0 0 auto; }
  .ct-msel select { flex: 1; min-width: 0; width: 100%; border: 0; background: transparent; outline: none; font-family: var(--ff); font-size: 12.5px; font-weight: 700; color: var(--ink); padding: 9px 0; cursor: pointer; }
  .ct-msel select:disabled { color: var(--ink-dim); cursor: not-allowed; }

  /* 장소 칩 */
  .ct-venuechip { display: inline-flex; align-items: center; gap: 6px; padding: 8px 8px 8px 11px; background: var(--grey-50); border: 1px solid var(--border); border-radius: 11px; }
  .ct-venuechip__nm { font-size: 13.5px; font-weight: 700; color: var(--ink); }
  .ct-venuechip__rg { font-size: 11.5px; color: var(--ink-mute); }
  .ct-venuechip button { width: 22px; height: 22px; border: 0; background: transparent; border-radius: 6px; display: grid; place-items: center; cursor: pointer; color: var(--ink-mute); }
  .ct-venuechip button:hover { background: var(--grey-200); color: var(--ink); }

  /* 날짜 행 */
  .ct-daterow { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--grey-50); border: 1px solid var(--border); border-radius: 12px; }
  .ct-daterow__idx { font-size: 11.5px; font-weight: 800; color: var(--ink-mute); white-space: nowrap; flex: 0 0 auto; }
  .ct-daterow__date { border: 1px solid var(--border); border-radius: 10px; background: #fff; font-family: var(--ff); font-size: 13px; font-weight: 600; color: var(--ink); padding: 8px 10px; flex: 0 0 auto; }
  .ct-adddate { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 11px; border: 1px dashed var(--border-strong); border-radius: 12px; background: var(--grey-50); color: var(--ink-soft); font-family: var(--ff); font-size: 13.5px; font-weight: 700; cursor: pointer; transition: border-color .12s, color .12s; }
  .ct-adddate:hover { border-color: var(--primary); color: var(--primary); }
  .ct-daterow__label { font-family: var(--ff-mono); font-size: 13px; font-weight: 700; color: var(--ink); white-space: nowrap; flex: 0 0 auto; }

  /* 유니폼 교체 버튼 + 정적 칩 */
  .ct-unichip--static { cursor: default; }
  .ct-uniswap { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 10px; padding: 11px; border: 1px solid var(--border-strong); border-radius: 12px; background: #fff; color: var(--ink-soft); font-family: var(--ff); font-size: 13.5px; font-weight: 800; cursor: pointer; transition: border-color .12s, color .12s, background .12s; }
  .ct-uniswap:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-weak); }

  /* 캘린더 모달 */
  .ct-cal { user-select: none; }
  .ct-cal__nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .ct-cal__nav button { width: 38px; height: 38px; border: 1px solid var(--border); border-radius: 10px; background: #fff; display: grid; place-items: center; cursor: pointer; color: var(--ink-soft); }
  .ct-cal__nav button:hover { background: var(--grey-50); border-color: var(--border-strong); }
  .ct-cal__title { font-size: 16px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
  .ct-cal__wk { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
  .ct-cal__wk span { text-align: center; font-size: 11.5px; font-weight: 800; color: var(--ink-mute); padding: 4px 0; }
  .ct-cal__wk span[data-wd="0"] { color: var(--danger); }
  .ct-cal__wk span[data-wd="6"] { color: var(--primary); }
  .ct-cal__grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .ct-cal__pad { aspect-ratio: 1; }
  .ct-cal__day { aspect-ratio: 1; border: 1.5px solid transparent; border-radius: 10px; background: var(--grey-50); font-family: var(--ff-mono); font-size: 14px; font-weight: 700; color: var(--ink); cursor: pointer; transition: background .1s, border-color .1s, color .1s; }
  .ct-cal__day:hover { border-color: var(--primary); }
  .ct-cal__day[data-wd="0"] { color: var(--danger); }
  .ct-cal__day[data-wd="6"] { color: var(--primary); }
  .ct-cal__day[data-today="true"] { box-shadow: inset 0 0 0 1.5px var(--border-strong); }
  .ct-cal__day[data-on="true"] { background: var(--primary); border-color: var(--primary); color: #fff; }
  .ct-cal__count { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 14px; padding: 9px; background: var(--primary-weak); border-radius: 10px; font-size: 13px; font-weight: 800; color: var(--primary); }

  /* 전역 — 카드/요소가 레이아웃 밖으로 넘치지 않게 */
  .ct-grid, .ct-col, .ct-grid > *, .ts-field { min-width: 0; }
  .ts-card { box-sizing: border-box; max-width: 100%; }

  /* 유니폼 텍스트 셀 (영문 라벨 제거) */
  .ct-unicell--text .ct-unicell__team { flex: 1; min-width: 0; }

  /* 장소 · 코트 행 */
  .ct-venuerow { border: 1px solid var(--border); border-radius: 14px; padding: 12px; background: var(--grey-50); }
  .ct-venuerow__top { display: flex; align-items: center; gap: 8px; }
  .ct-venuerow__nm { font-size: 14.5px; font-weight: 800; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ct-venuerow__rg { font-size: 12px; color: var(--ink-mute); white-space: nowrap; }
  .ct-venuerow__top .ct-iconbtn { margin-left: auto; }
  .ct-venuerow__ctrl { display: flex; align-items: center; gap: 10px; margin-top: 11px; flex-wrap: wrap; }
  .ct-venuerow__lbl { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); }
  .ct-namesel { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .ct-courtchips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 11px; padding-top: 11px; border-top: 1px solid var(--border); }
  .ct-courttag { font-size: 12px; font-weight: 700; font-family: var(--ff-mono); color: var(--primary); background: var(--primary-weak); border-radius: 8px; padding: 4px 9px; }

  /* 날짜 블록 + 코트 배정 */
  .ct-dateblock { border: 1px solid var(--border); border-radius: 14px; padding: 11px 12px; background: var(--grey-50); }
  .ct-dateblock__head { display: flex; align-items: center; gap: 10px; }
  .ct-dateblock__n { margin-left: auto; font-size: 11.5px; font-weight: 800; font-family: var(--ff-mono); color: var(--ink-mute); white-space: nowrap; }
  .ct-courtpick { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .ct-courtpick__chip { display: inline-flex; align-items: center; gap: 4px; padding: 7px 11px; border: 1.5px solid var(--border); border-radius: 9px; background: #fff; color: var(--ink-soft); font-family: var(--ff); font-size: 12.5px; font-weight: 700; cursor: pointer; transition: border-color .12s, background .12s, color .12s; }
  .ct-courtpick__chip:hover { border-color: var(--border-strong); }
  .ct-courtpick__chip[data-on="true"] { border-color: var(--primary); background: var(--primary-weak); color: var(--primary); }
  .ct-courthint { display: flex; align-items: center; gap: 6px; margin-top: 9px; font-size: 12px; font-weight: 600; color: var(--ink-dim); }
  .ct-courthint svg { flex: 0 0 auto; }

  /* 게시 설정 모달 — 기간 입력 */
  .ct-daterange { display: flex; align-items: center; gap: 8px; }
  .ct-daterange .ts-input { flex: 1; min-width: 0; }
  .ct-daterange__sep { color: var(--ink-mute); font-weight: 700; flex: 0 0 auto; }

  /* 결제 방법 — 중복선택 칩 */
  .ct-paygrid { display: flex; flex-direction: column; gap: 8px; }
  .ct-paychip { display: flex; align-items: center; gap: 11px; width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; background: #fff; font-family: var(--ff); cursor: pointer; transition: border-color .12s, background .12s; }
  .ct-paychip:hover:not(:disabled) { border-color: var(--border-strong); }
  .ct-paychip[data-on="true"] { border-color: var(--primary); background: var(--primary-weak); }
  .ct-paychip:disabled { cursor: not-allowed; background: var(--grey-50); }
  .ct-paychip__box { width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--border-strong); background: #fff; display: grid; place-items: center; color: #fff; flex: 0 0 auto; transition: background .12s, border-color .12s; }
  .ct-paychip[data-on="true"] .ct-paychip__box { background: var(--primary); border-color: var(--primary); }
  .ct-paychip:disabled .ct-paychip__box { border-color: var(--border); background: var(--grey-100); }
  .ct-paychip__lbl { font-size: 14.5px; font-weight: 800; color: var(--ink); }
  .ct-paychip:disabled .ct-paychip__lbl { color: var(--ink-dim); }
  .ct-paychip__soon { margin-left: auto; font-size: 11px; font-weight: 800; color: var(--warn); background: var(--warn-weak); border-radius: 7px; padding: 4px 9px; flex: 0 0 auto; }
  .ct-reqtag { font-size: 11px; font-weight: 800; color: var(--danger); background: var(--danger-weak); border-radius: 7px; padding: 4px 8px; white-space: nowrap; flex: 0 0 auto; }
  @media (max-width: 720px) { .ct-namesel { margin-left: 0; } }

  @media (max-width: 720px) {
    .ct-pal { grid-template-columns: repeat(6, 1fr); }
    .ct-hexinput, .ct-msel select, .ct-daterow__date { font-size: 16px; }
    .ct-uni { grid-template-columns: 1fr; }
    .ct-dvn__match { flex-direction: column; }
  }

  /* 하단 고정 바 */
  .ct-bar { position: fixed; left: var(--sidebar-w); right: 0; bottom: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); border-top: 1px solid var(--border); z-index: 80; }
  @media (max-width: 900px) { .ct-bar { left: 0; } }
  .ct-bar__inner { max-width: 1180px; margin: 0 auto; padding: 14px 32px; display: flex; align-items: center; gap: 14px; }
  @media (max-width: 720px) { .ct-bar__inner { padding: 12px 16px; gap: 10px; } }
  .ct-bar__meta { font-size: 13px; color: var(--ink-mute); white-space: nowrap; }
  @media (max-width: 560px) { .ct-bar__meta { display: none; } }

  .ct-spin { width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.45); border-top-color: #fff; border-radius: 50%; display: inline-block; margin-right: 8px; animation: ctspin .7s linear infinite; }
  @keyframes ctspin { to { transform: rotate(360deg); } }

  /* iOS 16px input (모바일) */
  @media (max-width: 720px) {
    .ct-dvn__method, .ts-select { font-size: 16px; }
  }

  /* 성공 화면 */
  .ct-success { max-width: 460px; margin: 8vh auto 0; text-align: center; }
  .ct-success__icon { width: 76px; height: 76px; border-radius: 24px; background: var(--ok-weak); color: var(--ok); display: grid; place-items: center; margin: 0 auto 22px; }
</style>
</head>
<body>
<div id="root"></div>

<div id="tweaks" class="tweaks">
  <div class="tweaks__title">TWEAKS <button id="tweaks-close" style="background:transparent;border:0;color:inherit;cursor:pointer;font-size:16px;line-height:1">×</button></div>
  <div class="tweaks__lbl">강조색 (Primary)</div>
  <div class="tweaks__row" data-group="primary">
    <button class="tweaks__btn" data-val="#3182F6">Toss Blue</button>
    <button class="tweaks__btn" data-val="#2AC1BC">Teal</button>
    <button class="tweaks__btn" data-val="#6D5AE6">Violet</button>
  </div>
  <div class="tweaks__lbl">카드 라운딩</div>
  <div class="tweaks__row" data-group="radius">
    <button class="tweaks__btn" data-val="24px">24px</button>
    <button class="tweaks__btn" data-val="16px">16px</button>
  </div>
</div>
<script>const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{ "primary": "#3182F6", "radius": "16px" }/*EDITMODE-END*/;</script>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="image-slot.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="toss-data.jsx"></script>
<script src="tournament-data.jsx"></script>
<script type="text/babel" src="toss-kit.jsx"></script>
<script type="text/babel" src="tn-screens.jsx"></script>
<script type="text/babel" src="ct-game-settings.jsx"></script>
<script type="text/babel" src="create-tournament.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const NAV = [
  { group: '운영', items: [
    { id: 'dashboard', icon: 'layout-dashboard', label: '대시보드' },
    { id: 'users', icon: 'users', label: '사용자' },
    { id: 'tournaments', icon: 'trophy', label: '대회' },
    { id: 'games', icon: 'volleyball', label: '경기' },
    { id: 'community', icon: 'message-square', label: '커뮤니티' },
    { id: 'orgs', icon: 'building-2', label: '단체' },
    { id: 'teams', icon: 'shield', label: '팀' },
    { id: 'courts', icon: 'map-pin', label: '코트' },
  ]},
  { group: '비즈니스', items: [
    { id: 'payments', icon: 'credit-card', label: '결제' },
    { id: 'analytics', icon: 'bar-chart-3', label: '분석' },
  ]},
];

function SuccessView({ result, onGoDetail, onGoList }) {
  return (
    <div className="ct-success">
      <div className="ct-success__icon"><window.Icon name="check" size={38} /></div>
      <h1 className="ts-ph__title" style={{ fontSize: 24 }}>대회가 생성되었습니다</h1>
      <p className="ts-ph__sub" style={{ margin: '10px auto 0' }}>
        <b style={{ color: 'var(--ink)' }}>{result.name}</b> 생성 완료 · 종별 규칙 {result.divCount}건 자동 생성됨.
        이어서 참가팀 모집·대진을 설정하세요.
      </p>
      <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginTop: 26 }}>
        <window.Btn variant="secondary" onClick={onGoList}>대회 목록</window.Btn>
        <window.Btn icon="arrow-right" iconRight="arrow-right" onClick={onGoDetail}>대회 상세로 이동</window.Btn>
      </div>
    </div>);
}

function App() {
  const [mOpen, setMOpen] = useState(false);
  const [toastMsg, setToastMsg] = useState(null);
  const [done, setDone] = useState(null);
  const toast = (m) => { setToastMsg(m); clearTimeout(window.__t); window.__t = setTimeout(() => setToastMsg(null), 2600); };

  useEffect(() => {
    const panel = document.getElementById('tweaks'), closeBtn = document.getElementById('tweaks-close');
    const handler = (e) => { if (e.data?.type === '__activate_edit_mode') panel.setAttribute('data-open', 'true'); if (e.data?.type === '__deactivate_edit_mode') panel.setAttribute('data-open', 'false'); };
    window.addEventListener('message', handler); window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    closeBtn.onclick = () => panel.setAttribute('data-open', 'false');
    const apply = (gp, v) => { if (gp === 'primary') { document.documentElement.style.setProperty('--primary', v); const mix = { '#3182F6': '#1B64DA', '#2AC1BC': '#1AA39E', '#6D5AE6': '#5544C9' }; document.documentElement.style.setProperty('--primary-hover', mix[v] || v); document.documentElement.style.setProperty('--primary-weak', v + '18'); } if (gp === 'radius') document.documentElement.style.setProperty('--radius-card', v); };
    const sync = { primary: TWEAK_DEFAULTS.primary, radius: TWEAK_DEFAULTS.radius };
    panel.querySelectorAll('[data-group]').forEach((row) => { const gp = row.getAttribute('data-group'); row.querySelectorAll('.tweaks__btn').forEach((btn) => { btn.setAttribute('data-active', btn.getAttribute('data-val') === sync[gp] ? 'true' : 'false'); btn.onclick = () => { row.querySelectorAll('.tweaks__btn').forEach((b) => b.setAttribute('data-active', 'false')); btn.setAttribute('data-active', 'true'); const v = btn.getAttribute('data-val'); apply(gp, v); window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [gp]: v } }, '*'); }; }); });
    apply('primary', sync.primary); apply('radius', sync.radius);
    return () => window.removeEventListener('message', handler);
  }, []);

  const Nav = () =>
    <nav className="ts-sidebar__nav">
      {NAV.map((g) =>
        <React.Fragment key={g.group}>
          <div className="ts-sidebar__label">{g.group}</div>
          {g.items.map((it) =>
            <button key={it.id} type="button" className="ts-navlink" data-active={it.id === 'tournaments' ? 'true' : 'false'} onClick={() => { setMOpen(false); if (it.id !== 'tournaments') toast(`'${it.label}' — 데모에서는 새 대회 만들기만 표시됩니다`); }}>
              <window.Icon name={it.icon} size={19} /><span>{it.label}</span>
            </button>)}
        </React.Fragment>)}
    </nav>;

  return (
    <div className="ts-shell">
      <aside className="ts-sidebar">
        <div className="ts-sidebar__brand"><span className="ts-sidebar__brand-dot">B</span> MyBDR <span style={{ fontSize: 12, color: 'var(--ink-dim)', fontWeight: 600 }}>관리자</span></div>
        <Nav />
        <div className="ts-sidebar__foot"><button className="ts-userchip" type="button"><span className="ts-avatar">오영</span><span style={{ textAlign: 'left', lineHeight: 1.2 }}><span style={{ display: 'block', fontWeight: 700, fontSize: 14, color: 'var(--ink)' }}>오영진</span><span style={{ fontSize: 12, color: 'var(--ink-mute)' }}>대회 운영자</span></span><window.Icon name="chevron-right" size={18} color="var(--ink-dim)" style={{ marginLeft: 'auto' }} /></button></div>
      </aside>

      <div className="ts-topbar"><button className="ts-mtoggle" type="button" onClick={() => setMOpen(true)}><window.Icon name="menu" size={22} /></button><span style={{ fontWeight: 800, fontSize: 16 }}>새 대회 만들기</span></div>
      {mOpen && <div className="ts-overlay" onClick={() => setMOpen(false)} />}
      <aside className="ts-drawer" data-open={mOpen ? 'true' : 'false'}><div className="ts-sidebar__brand"><span className="ts-sidebar__brand-dot">B</span> MyBDR</div><Nav /></aside>

      <main className="ts-main"><div className="ct-main__inner">
        {done
          ? <SuccessView result={done} onGoDetail={() => toast('대회 상세(참가팀+대진)로 이동')} onGoList={() => setDone(null)} />
          : <window.CreateTournament toast={toast}
              onCancel={() => toast('취소 — 대회 목록으로 돌아갑니다')}
              onCreated={(r) => { setDone(r); toast(`'${r.name}' 생성 완료`); }} />}
      </div></main>

      {toastMsg && <div className="ts-toast"><window.Icon name="check-circle-2" size={18} color="var(--ok)" />{toastMsg}</div>}
    </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
