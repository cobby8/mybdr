const { useState, useEffect } = React;

function App() {
  // Persisted route so refresh doesn't lose place
  // Allow ?route=xxx URL override (used by mobile audit harness)
  const [route, setRoute] = useState(() => {
    try {
      const q = new URLSearchParams(window.location.search).get('route');
      if (q) return q;
    } catch (e) {}
    return localStorage.getItem('mybdr.route') || 'home';
  });
  const [activeBoard, setActiveBoard] = useState(() => localStorage.getItem('mybdr.board') || 'free');

  // Theme
  const [theme, setTheme] = useState(() => {
    return localStorage.getItem('mybdr.theme') || (TWEAK_DEFAULTS.theme || 'light');
  });
  const [onbOpen, setOnbOpen] = useState(() => {
    // Skip onboarding modal when launched via ?route= (mobile audit / deep links)
    try {
      if (new URLSearchParams(window.location.search).get('route')) return false;
    } catch (e) {}
    return !localStorage.getItem('mybdr.onbDone');
  });
  const [promo, setPromo] = useState(() => TWEAK_DEFAULTS.promo || 'blue');

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('mybdr.theme', theme);
  }, [theme]);

  useEffect(() => {
    document.documentElement.setAttribute('data-promo', promo);
  }, [promo]);

  useEffect(() => { localStorage.setItem('mybdr.route', route); }, [route]);
  useEffect(() => { localStorage.setItem('mybdr.board', activeBoard); }, [activeBoard]);

  // Tweaks panel wiring
  useEffect(() => {
    const panel = document.getElementById('tweaks');
    const closeBtn = document.getElementById('tweaks-close');
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') panel.setAttribute('data-open', 'true');
      if (e.data?.type === '__deactivate_edit_mode') panel.setAttribute('data-open', 'false');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    closeBtn.onclick = () => panel.setAttribute('data-open', 'false');

    // init active state
    panel.querySelectorAll('[data-group="theme"] .tweaks__btn').forEach(b => {
      b.setAttribute('data-active', b.getAttribute('data-val') === theme ? 'true' : 'false');
    });
    panel.querySelectorAll('[data-group="promo"] .tweaks__btn').forEach(b => {
      b.setAttribute('data-active', b.getAttribute('data-val') === promo ? 'true' : 'false');
    });

    panel.querySelectorAll('[data-group]').forEach(row => {
      const group = row.getAttribute('data-group');
      row.querySelectorAll('.tweaks__btn').forEach(btn => {
        btn.onclick = () => {
          row.querySelectorAll('.tweaks__btn').forEach(b => b.setAttribute('data-active', 'false'));
          btn.setAttribute('data-active', 'true');
          const val = btn.getAttribute('data-val');
          if (group === 'theme') setTheme(val);
          if (group === 'onboarding' && val === 'show') {
            localStorage.removeItem('mybdr.onbDone');
            setOnbOpen(true);
          }
          if (group === 'promo') {
            setPromo(val);
          }
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [group]: val } }, '*');
        };
      });
    });
    return () => window.removeEventListener('message', handler);
  }, [theme, promo]);

  const finishOnb = (t) => {
    setTheme(t);
    localStorage.setItem('mybdr.onbDone', '1');
    setOnbOpen(false);
  };
  const skipOnb = () => {
    localStorage.setItem('mybdr.onbDone', '1');
    setOnbOpen(false);
  };

  let screen;
  if (route === 'post')        screen = <PostDetail setRoute={setRoute} activeBoard={activeBoard} setActiveBoard={setActiveBoard}/>;
  else if (route === 'board')  screen = <BoardList activeBoard={activeBoard} setActiveBoard={setActiveBoard} setRoute={setRoute}/>;
  else if (route === 'write')  screen = <PostWrite activeBoard={activeBoard} setActiveBoard={setActiveBoard} setRoute={setRoute}/>;
  else if (route === 'match')  screen = <MatchList setRoute={setRoute}/>;
  else if (route === 'matchDetail') screen = <MatchDetail setRoute={setRoute}/>;
  else if (route === 'team')   screen = <TeamList setRoute={setRoute}/>;
  else if (route === 'teamDetail') screen = <TeamDetail setRoute={setRoute}/>;
  else if (route === 'court')  screen = <CourtList setRoute={setRoute}/>;
  else if (route === 'courtDetail') screen = <CourtDetail setRoute={setRoute}/>;
  else if (route === 'rank')   screen = <Rank setRoute={setRoute}/>;
  else if (route === 'games')  screen = <GamesList setRoute={setRoute}/>;
  else if (route === 'orgs')   screen = <OrgsList setRoute={setRoute}/>;
  else if (route === 'login')  screen = <Login setRoute={setRoute}/>;
  else if (route === 'pricing')screen = <Pricing setRoute={setRoute}/>;
  else if (route === 'help')   screen = <Help setRoute={setRoute}/>;
  else if (route === 'search') screen = <Search setRoute={setRoute}/>;

  else if (route === 'signup')  screen = <Signup setRoute={setRoute}/>;

  else if (route === 'adminTournamentDetail') screen = <AdminTournamentDetail setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (route === 'adminTournamentAuditLog') screen = <AdminTournamentAuditLog setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (route === 'adminTournamentTransferOrganizer') screen = <AdminTournamentTransferOrganizer setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (route === 'adminOrganizations')    screen = <AdminOrganizations setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (route === 'adminNotifications')    screen = <AdminNotifications setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (route === 'adminTournamentAdminHome')   screen = <AdminTournamentAdminHome setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (route === 'adminTournamentAdminList')   screen = <AdminTournamentAdminList setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (route === 'adminTournamentSetupHub')    screen = <AdminTournamentSetupHub setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (route === 'adminTournamentNew')         screen = <AdminTournamentWizard1Step setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (route === 'adminTournamentEditWizard')  screen = <AdminTournamentEditWizard setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (window.ADMIN_COMING_SOON_ROUTES && window.ADMIN_COMING_SOON_ROUTES.indexOf(route) !== -1) screen = <AdminComingSoon setRoute={setRoute} theme={theme} setTheme={setTheme} routeKey={route}/>;
  else                          screen = <Home setRoute={setRoute} setActiveBoard={setActiveBoard}/>;

  // route group `(score-sheet)` 격리 — AppNav / footer 미노출
  const isScoreSheet = route === 'scoreSheet';
  const isAdmin = route === 'adminDashboard'
               || route === 'adminWizardTournament'
               || route === 'adminWizardAssociation'
               || route === 'adminTournaments'
               || route === 'adminGames'
               || route === 'adminTeams'
               || route === 'adminCourts'
               || route === 'adminCommunity'
               || route === 'adminNews'
               || route === 'adminUsers'
               || route === 'adminGameReports'
               || route === 'adminSuggestions'
               || route === 'adminPlans'
               || route === 'adminPayments'
               || route === 'adminCampaigns'
               || route === 'adminPartners'
               || route === 'partnerAdminEntry'
               || route === 'adminAnalytics'
               || route === 'adminSettings'
               || route === 'adminLogs'
               || route === 'adminMe'
               || route === 'adminTournamentDetail'
               || route === 'adminTournamentAuditLog'
               || route === 'adminTournamentTransferOrganizer'
               || route === 'adminOrganizations'
               || route === 'adminNotifications'
               || route === 'adminTournamentAdminHome'
               || route === 'adminTournamentAdminList'
               || route === 'adminTournamentSetupHub'
               || route === 'adminTournamentNew'
               || route === 'adminTournamentEditWizard'
               || (window.ADMIN_COMING_SOON_ROUTES && window.ADMIN_COMING_SOON_ROUTES.indexOf(route) !== -1);

  if (isScoreSheet) {
    return screen;
  }
  if (isAdmin) {
    // admin 자체 셰 — AppNav / footer 미노출
    return screen;
  }

  return (
    <>
      <AppNav route={route} setRoute={setRoute} theme={theme} setTheme={setTheme}/>
      {screen}
      {onbOpen && <Onboarding onPick={finishOnb} onSkip={skipOnb}/>}
      <footer style={{padding:'32px 24px 60px', textAlign:'center', fontSize:12, color:'var(--ink-dim)', borderTop:'1px solid var(--border)', marginTop:40, background:'var(--bg-elev)'}}>
        <div style={{fontFamily:'var(--ff-display)', fontWeight:900, fontSize:18, marginBottom:10, letterSpacing:'-0.01em', color:'var(--ink-soft)'}}>MyBDR</div>
        <div>서울 3x3 농구 커뮤니티 · 2026</div>
        <div style={{marginTop:10, display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap'}}>
          <a onClick={(e)=>{e.preventDefault();setRoute('about');}} style={{cursor:'pointer'}}>소개</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('pricing');}} style={{cursor:'pointer'}}>요금제</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('help');}} style={{cursor:'pointer'}}>도움말</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('calendar');}} style={{cursor:'pointer'}}>일정</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('saved');}} style={{cursor:'pointer'}}>보관함</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('messages');}} style={{cursor:'pointer'}}>쪽지</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('live');}} style={{cursor:'pointer'}}>라이브</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('series');}} style={{cursor:'pointer'}}>시리즈</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('myActivity');}} style={{cursor:'pointer'}}>내 활동</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('billing');}} style={{cursor:'pointer'}}>결제</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('terms');}} style={{cursor:'pointer'}}>이용약관</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('privacy');}} style={{cursor:'pointer'}}>개인정보처리방침</a>
        </div>
        <div style={{marginTop:18, display:'inline-flex', flexWrap:'wrap', gap:8, justifyContent:'center', alignItems:'center', padding:'10px 14px', borderRadius:6, background:'var(--bg-alt)', border:'1px solid var(--border)', fontSize:11, color:'var(--ink-mute)', fontFamily:'var(--ff-mono)', letterSpacing:'0.04em'}}>
          <span style={{color:'var(--accent)', fontWeight:700}}>ADMIN DEBUG</span>
          <span style={{opacity:0.4}}>·</span>
          <a onClick={(e)=>{e.preventDefault();setRoute('adminDashboard');}} style={{cursor:'pointer', color:'var(--ink-soft)'}}>대시보드</a>
          <a onClick={(e)=>{e.preventDefault();setRoute('adminWizardTournament');}} style={{cursor:'pointer', color:'var(--ink-soft)'}}>대회 마법사</a>
          <a onClick={(e)=>{e.preventDefault();setRoute('adminWizardAssociation');}} style={{cursor:'pointer', color:'var(--ink-soft)'}}>협회 마법사</a>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
