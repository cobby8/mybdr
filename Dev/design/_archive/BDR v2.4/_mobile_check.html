<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mobile Check</title>
<style>
  body { margin: 0; padding: 0; background: #1a1a1a; display: flex; gap: 12px; padding: 12px; flex-wrap: wrap; font-family: system-ui; color: #fff; }
  .frame { display: flex; flex-direction: column; gap: 6px; }
  .frame label { font-size: 11px; color: #aaa; font-family: monospace; }
  iframe { width: 375px; height: 700px; border: 1px solid #444; background: #fff; }
  select { padding: 8px; background: #222; color: #fff; border: 1px solid #444; }
</style>
</head>
<body>
<div class="frame">
  <select id="r1" onchange="document.getElementById('f1').src='MyBDR.html'+(this.value?'#'+this.value:'')">
    <option value="rank">rank — 팀 랭킹 테이블</option>
    <option value="rank">rank — 선수 랭킹 (탭전환 필요)</option>
    <option value="bracket">bracket — 진출 테이블</option>
    <option value="teamManage">teamManage — 로스터</option>
    <option value="billing">billing — 결제내역</option>
    <option value="scrim">scrim — 히스토리</option>
    <option value="match">match — 참가팀</option>
    <option value="teamDetail">teamDetail — roster/recent</option>
    <option value="playerProfile">playerProfile — games</option>
    <option value="stats">stats — 게임로그</option>
    <option value="referee">referee — 히스토리</option>
    <option value="messages">messages — 모바일 push 흐름</option>
  </select>
  <label id="l1">375 × 700</label>
  <iframe id="f1" src="MyBDR.html#rank"></iframe>
</div>
</body>
</html>
