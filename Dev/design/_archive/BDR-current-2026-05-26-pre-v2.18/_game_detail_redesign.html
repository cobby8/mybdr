<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>경기 상세 리디자인 — 3 시안 비교</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; min-height: 100%; }
  /* Default to light theme so the artboards render with light tokens */
  html { color-scheme: light; }
  /* Artboards host an entire page chrome — give them their own theme scope */
  .gd-artboard {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
  }
  /* Force light theme inside artboards (the screenshot the user shared is light) */
  .gd-artboard { color-scheme: light; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens-gd/data.jsx"></script>
<script type="text/babel" src="screens-gd/ConceptA.jsx"></script>
<script type="text/babel" src="screens-gd/ConceptB.jsx"></script>
<script type="text/babel" src="screens-gd/ConceptC.jsx"></script>

<script type="text/babel" data-presets="react">
const { useEffect } = React;

function App() {
  // 데이터 테마를 light로 강제 (스크린샷이 light)
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', 'light');
  }, []);

  return (
    <DesignCanvas>
      <DCSection
        id="game-detail"
        title="경기 상세 — 리디자인 3 시안"
        subtitle="정보 가독성 + 신청 플로우 + 신청자 현황 시각화. 카드 헤더의 ↗ 버튼으로 풀스크린 비교."
      >
        <DCArtboard id="A" label="A · 코트 라인업 (포지션 비주얼)" width={1180} height={1320}>
          <div className="gd-artboard"><GDConceptA/></div>
        </DCArtboard>

        <DCArtboard id="B" label="B · 10인 슬롯 보드 (자리 채우기)" width={1180} height={1480}>
          <div className="gd-artboard"><GDConceptB/></div>
        </DCArtboard>

        <DCArtboard id="C" label="C · 신청 현황 대시보드 (데이터)" width={1180} height={1400}>
          <div className="gd-artboard"><GDConceptC/></div>
        </DCArtboard>
      </DCSection>

      <DCPostIt x={60} y={120}>
        <b>3 시안 비교 포인트</b>
        <br/><br/>
        <b>A. 코트 라인업</b><br/>
        포지션을 코트 위에 시각화. 빈 자리가 어디에 필요한지 한눈에. 농구 경기다운 비주얼.
        <br/><br/>
        <b>B. 10인 슬롯 보드</b><br/>
        모집의 본질("자리 채우기")을 큰 5×2 슬롯으로. 빈자리는 점선 + "+ 들어오기" CTA.
        <br/><br/>
        <b>C. 데이터 대시보드</b><br/>
        도넛/막대 차트로 포지션 밸런스·레벨 분포·실시간 신청 타임라인. 정보 밀도 최고.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
