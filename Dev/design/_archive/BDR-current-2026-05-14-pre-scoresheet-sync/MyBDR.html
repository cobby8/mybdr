  <div class="tweaks__lbl">테마</div>

  <div class="tweaks__lbl">첫 방문 온보딩</div>

    <button class="tweaks__btn" data-val="show">다시보기</button>

  <div class="tweaks__lbl">홈 프로모 색상</div>
  <div class="tweaks__row" data-group="promo">
    <button class="tweaks__btn" data-val="blue">카페 블루</button>
    <button class="tweaks__btn" data-val="red">BDR 레드</button>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  // Persisted route so refresh doesn't lose place
  // Allow ?route=xxx URL override (used by mobile audit harness)
  const [route, setRoute] = useState(() => {
    try {
      const q = new URLSearchParams(window.location.search).get('route');
      if (q) return q;
    } catch (e) {}
    return localStorage.getItem('mybdr.route') || 'home';
  });
  const [activeBoard, setActiveBoard] = useState(() => localStorage.getItem('mybdr.board') || 'free');

  // Theme
  const [theme, setTheme] = useState(() => {
    return localStorage.getItem('mybdr.theme') || (TWEAK_DEFAULTS.theme || 'light');
  });
  const [onbOpen, setOnbOpen] = useState(() => {
    // Skip onboarding modal when launched via ?route= (mobile audit / deep links)
    try {
      if (new URLSearchParams(window.location.search).get('route')) return false;
    } catch (e) {}
    return !localStorage.getItem('mybdr.onbDone');
  });
  const [promo, setPromo] = useState(() => TWEAK_DEFAULTS.promo || 'blue');

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('mybdr.theme', theme);
  }, [theme]);

  useEffect(() => {
    document.documentElement.setAttribute('data-promo', promo);
  }, [promo]);

  useEffect(() => { localStorage.setItem('mybdr.route', route); }, [route]);
  useEffect(() => { localStorage.setItem('mybdr.board', activeBoard); }, [activeBoard]);

  // Tweaks panel wiring
  useEffect(() => {
    const panel = document.getElementById('tweaks');
    const closeBtn = document.getElementById('tweaks-close');
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') panel.setAttribute('data-open', 'true');
      if (e.data?.type === '__deactivate_edit_mode') panel.setAttribute('data-open', 'false');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    closeBtn.onclick = () => panel.setAttribute('data-open', 'false');

    // init active state
    panel.querySelectorAll('[data-group="theme"] .tweaks__btn').forEach(b => {
      b.setAttribute('data-active', b.getAttribute('data-val') === theme ? 'true' : 'false');
    });
    panel.querySelectorAll('[data-group="promo"] .tweaks__btn').forEach(b => {
      b.setAttribute('data-active', b.getAttribute('data-val') === promo ? 'true' : 'false');
    });

    panel.querySelectorAll('[data-group]').forEach(row => {
      const group = row.getAttribute('data-group');
      row.querySelectorAll('.tweaks__btn').forEach(btn => {
        btn.onclick = () => {
          row.querySelectorAll('.tweaks__btn').forEach(b => b.setAttribute('data-active', 'false'));
          btn.setAttribute('data-active', 'true');
          const val = btn.getAttribute('data-val');
          if (group === 'theme') setTheme(val);
          if (group === 'onboarding' && val === 'show') {
            localStorage.removeItem('mybdr.onbDone');
            setOnbOpen(true);
          }
          if (group === 'promo') {
            setPromo(val);
          }
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [group]: val } }, '*');
        };
      });
    });
    return () => window.removeEventListener('message', handler);
  }, [theme, promo]);

  const finishOnb = (t) => {
    setTheme(t);
    localStorage.setItem('mybdr.onbDone', '1');
    setOnbOpen(false);
  };
  const skipOnb = () => {
    localStorage.setItem('mybdr.onbDone', '1');
    setOnbOpen(false);
  };

  let screen;
  if (route === 'post')        screen = <PostDetail setRoute={setRoute} activeBoard={activeBoard} setActiveBoard={setActiveBoard}/>;
  else if (route === 'board')  screen = <BoardList activeBoard={activeBoard} setActiveBoard={setActiveBoard} setRoute={setRoute}/>;
  else if (route === 'write')  screen = <PostWrite activeBoard={activeBoard} setActiveBoard={setActiveBoard} setRoute={setRoute}/>;
  else if (route === 'match')  screen = <MatchList setRoute={setRoute}/>;
  else if (route === 'matchDetail') screen = <MatchDetail setRoute={setRoute}/>;
  else if (route === 'team')   screen = <TeamList setRoute={setRoute}/>;
  else if (route === 'teamDetail') screen = <TeamDetail setRoute={setRoute}/>;
  else if (route === 'court')  screen = <CourtList setRoute={setRoute}/>;
  else if (route === 'courtDetail') screen = <CourtDetail setRoute={setRoute}/>;
  else if (route === 'rank')   screen = <Rank setRoute={setRoute}/>;
  else if (route === 'games')  screen = <GamesList setRoute={setRoute}/>;
  else if (route === 'orgs')   screen = <OrgsList setRoute={setRoute}/>;
  else if (route === 'login')  screen = <Login setRoute={setRoute}/>;
  else if (route === 'pricing')screen = <Pricing setRoute={setRoute}/>;
  else if (route === 'help')   screen = <Help setRoute={setRoute}/>;
  else if (route === 'search') screen = <Search setRoute={setRoute}/>;
  else if (route === 'profile') screen = <Profile setRoute={setRoute}/>;
  else if (route === 'signup')  screen = <Signup setRoute={setRoute}/>;
  else if (route === 'gameDetail') screen = <GameDetail setRoute={setRoute}/>;
  else if (route === 'orgDetail') screen = <OrgDetail setRoute={setRoute}/>;
  else if (route === 'notifications') screen = <Notifications setRoute={setRoute}/>;
  else if (route === 'settings') screen = <Settings setRoute={setRoute} theme={theme} setTheme={setTheme}/>;
  else if (route === 'createTeam') screen = <CreateTeam setRoute={setRoute}/>;
  else if (route === 'createGame') screen = <CreateGame setRoute={setRoute}/>;
  else if (route === 'gameResult') screen = <GameResult setRoute={setRoute}/>;
  else if (route === 'live')       screen = <Live setRoute={setRoute}/>;
  else if (route === 'saved')      screen = <Saved setRoute={setRoute}/>;
  else if (route === 'messages')   screen = <Messages setRoute={setRoute}/>;
  else if (route === 'calendar')   screen = <Calendar setRoute={setRoute}/>;
  else if (route === 'bracket')    screen = <Bracket setRoute={setRoute}/>;
  else if (route === 'mygames')      screen = <MyGames setRoute={setRoute}/>;
  else if (route === 'checkout')     screen = <Checkout setRoute={setRoute}/>;
  else if (route === 'teamInvite')   screen = <TeamInvite setRoute={setRoute}/>;
  else if (route === 'guestApps')    screen = <GuestApps setRoute={setRoute}/>;
  else if (route === 'playerProfile') screen = <PlayerProfile setRoute={setRoute}/>;
  else if (route === 'referee')    screen = <Referee setRoute={setRoute}/>;
  else if (route === 'reviews')    screen = <Reviews setRoute={setRoute}/>;
  else if (route === 'awards')     screen = <Awards setRoute={setRoute}/>;
  else if (route === 'gallery')    screen = <Gallery setRoute={setRoute}/>;
  else if (route === 'safety')     screen = <Safety setRoute={setRoute}/>;
  else if (route === 'scrim')        screen = <Scrim setRoute={setRoute}/>;
  else if (route === 'achievements') screen = <Achievements setRoute={setRoute}/>;
  else if (route === 'stats')        screen = <Stats setRoute={setRoute}/>;
  else if (route === 'coaches')      screen = <Coaches setRoute={setRoute}/>;
  else if (route === 'shop')         screen = <Shop setRoute={setRoute}/>;
  else if (route === 'courtBooking') screen = <CourtBooking setRoute={setRoute}/>;
  else if (route === 'teamCreate')   screen = <TeamCreate setRoute={setRoute}/>;
  else if (route === 'tournamentEnroll')   screen = <TournamentEnroll setRoute={setRoute}/>;
  else if (route === 'tournamentDetail')   screen = <TournamentDetail setRoute={setRoute}/>;
  else if (route === 'tournamentSchedule') screen = <TournamentSchedule setRoute={setRoute}/>;
  else if (route === 'tournamentTeams')    screen = <TournamentTeams setRoute={setRoute}/>;
  else if (route === 'guestApply')      screen = <GuestApply setRoute={setRoute}/>;
  else if (route === 'passwordReset')   screen = <PasswordReset setRoute={setRoute}/>;
  else if (route === 'editProfile')     screen = <EditProfile setRoute={setRoute}/>;
  else if (route === 'teamManage')      screen = <TeamManage setRoute={setRoute}/>;
  else if (route === 'refereeRequest')  screen = <RefereeRequest setRoute={setRoute}/>;
  else if (route === 'onboardingV2')    screen = <OnboardingV2 setRoute={setRoute}/>;
  else if (route === 'notificationSettings') screen = <NotificationSettings setRoute={setRoute}/>;
  else if (route === 'courtAdd')        screen = <CourtAdd setRoute={setRoute}/>;
  else if (route === 'gameReport')      screen = <GameReport setRoute={setRoute}/>;
  else if (route === 'searchResults')   screen = <SearchResults setRoute={setRoute}/>;
  else if (route === 'about')      screen = <About setRoute={setRoute}/>;
  else if (route === '404')        screen = <NotFound setRoute={setRoute}/>;
  else if (route === 'terms')      screen = <Terms setRoute={setRoute}/>;
  else if (route === 'privacy')    screen = <Privacy setRoute={setRoute}/>;
  else if (route === 'verify')     screen = <Verify setRoute={setRoute}/>;
  else if (route === 'myActivity') screen = <MyActivity setRoute={setRoute}/>;
  else if (route === 'series')     screen = <Series setRoute={setRoute}/>;
  else if (route === 'seriesDetail') screen = <SeriesDetail setRoute={setRoute}/>;
  else if (route === 'seriesCreate') screen = <SeriesCreate setRoute={setRoute}/>;
  else if (route === 'billing')    screen = <Billing setRoute={setRoute}/>;
  else if (route === 'profileBasketball')          screen = <ProfileBasketball setRoute={setRoute}/>;
  else if (route === 'profileNotificationSettings') screen = <ProfileNotificationSettings setRoute={setRoute}/>;
  else if (route === 'profilePayments')            screen = <ProfilePayments setRoute={setRoute}/>;
  else if (route === 'profilePreferences')         screen = <ProfilePreferences setRoute={setRoute}/>;
  else if (route === 'profileSubscription')        screen = <ProfileSubscription setRoute={setRoute}/>;
  else if (route === 'invite')     screen = <Invite setRoute={setRoute}/>;
  else if (route === 'pricingFail')    screen = <PricingFail setRoute={setRoute}/>;
  else if (route === 'pricingSuccess') screen = <PricingSuccess setRoute={setRoute}/>;
  else if (route === 'globalComponents')      screen = <GlobalComponents setRoute={setRoute}/>;
  else if (route === 'onboardingIdentity')    screen = <OnboardingIdentity setRoute={setRoute}/>;
  else if (route === 'onboardingBasketball')  screen = <OnboardingBasketball setRoute={setRoute}/>;
  else if (route === 'onboardingEnvironment') screen = <OnboardingEnvironment setRoute={setRoute}/>;
  else if (route === 'onboardingPreferences') screen = <OnboardingPreferences setRoute={setRoute}/>;
  else if (route === 'onboardingSetup')       screen = <OnboardingSetup setRoute={setRoute}/>;
  else                          screen = <Home setRoute={setRoute} setActiveBoard={setActiveBoard}/>;

  return (
    <>
      <AppNav route={route} setRoute={setRoute} theme={theme} setTheme={setTheme}/>
      {screen}
      {onbOpen && <Onboarding onPick={finishOnb} onSkip={skipOnb}/>}
      <footer style={{padding:'32px 24px 60px', textAlign:'center', fontSize:12, color:'var(--ink-dim)', borderTop:'1px solid var(--border)', marginTop:40, background:'var(--bg-elev)'}}>
        <div style={{fontFamily:'var(--ff-display)', fontWeight:900, fontSize:18, marginBottom:10, letterSpacing:'-0.01em', color:'var(--ink-soft)'}}>MyBDR</div>
        <div>서울 3x3 농구 커뮤니티 · 2026</div>
        <div style={{marginTop:10, display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap'}}>
          <a onClick={(e)=>{e.preventDefault();setRoute('about');}} style={{cursor:'pointer'}}>소개</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('pricing');}} style={{cursor:'pointer'}}>요금제</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('help');}} style={{cursor:'pointer'}}>도움말</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('calendar');}} style={{cursor:'pointer'}}>일정</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('saved');}} style={{cursor:'pointer'}}>보관함</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('messages');}} style={{cursor:'pointer'}}>쪽지</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('live');}} style={{cursor:'pointer'}}>라이브</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('series');}} style={{cursor:'pointer'}}>시리즈</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('myActivity');}} style={{cursor:'pointer'}}>내 활동</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('billing');}} style={{cursor:'pointer'}}>결제</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('terms');}} style={{cursor:'pointer'}}>이용약관</a> ·
          <a onClick={(e)=>{e.preventDefault();setRoute('privacy');}} style={{cursor:'pointer'}}>개인정보처리방침</a>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
